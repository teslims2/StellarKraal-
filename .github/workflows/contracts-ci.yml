name: Contracts CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run Soroban contract tests
        run: |
          set -o pipefail
          cargo test --manifest-path contracts/stellarkraal/Cargo.toml 2>&1 | tee contract-test.log
          test ${PIPESTATUS[0]} -eq 0 || true

      - name: Annotate contract failures
        if: always()
        run: |
          if grep -q 'test result: FAILED' contract-test.log; then
            echo "::error file=contracts/stellarkraal/Cargo.toml::Soroban contract tests failed"
            exit 1
          fi
