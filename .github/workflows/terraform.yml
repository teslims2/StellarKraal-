###############################################################################
# .github/workflows/terraform.yml
#
# CI/CD Pipeline for StellarKraal Terraform IaC
#
# Triggers:
#   • Pull Request → fmt-check, init, validate, plan (no apply)
#   • Push to main  → plan + apply (requires manual approval via GitHub Environment)
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   AWS_ROLE_TO_ASSUME   — ARN of an IAM role with permission to manage infra
#                          (use OIDC — no long-lived keys needed)
#
# Required GitHub Environments (Settings → Environments):
#   staging    — no protection rules (auto-deploy)
#   production — protection rules: required reviewers, wait timer
#
# Required GitHub Variables (Settings → Variables → Actions):
#   TF_STATE_BUCKET — name of the S3 state bucket
#   AWS_REGION      — AWS region (e.g. us-east-1)
###############################################################################

name: "Terraform CI/CD"

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
    paths:
      - "infrastructure/**"

permissions:
  id-token: write   # Required for OIDC AWS authentication
  contents: read
  pull-requests: write  # Required to post plan output as PR comment

env:
  TF_VERSION: "1.8.3"
  WORKING_DIR: "infrastructure"
  AWS_REGION: ${{ vars.AWS_REGION }}

###############################################################################
# PULL REQUEST — Lint, Validate, Plan
###############################################################################
jobs:
  terraform-ci:
    name: "Plan (${{ matrix.workspace }})"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        workspace: [staging, production]

    environment: ${{ matrix.workspace }}

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC (no static keys) ──────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TF-Plan-${{ matrix.workspace }}

      # ── Install Terraform ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Format check ────────────────────────────────────────────────────────
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Init ────────────────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false

      # ── Select workspace ─────────────────────────────────────────────────────
      - name: Select Terraform Workspace
        run: |
          terraform workspace select ${{ matrix.workspace }} \
            || terraform workspace new ${{ matrix.workspace }}

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Plan ──────────────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="envs/${{ matrix.workspace }}.tfvars" \
            -no-color \
            -out="${{ matrix.workspace }}.tfplan" \
            -input=false
        continue-on-error: true  # don't block PR comment posting on failure

      # ── Post plan as PR comment ───────────────────────────────────────────────
      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const workspace = '${{ matrix.workspace }}';
            const fmt    = '${{ steps.fmt.outcome }}';
            const init   = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan   = '${{ steps.plan.outcome }}';
            const output = process.env.PLAN;

            const icon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const body = `## Terraform \`${ workspace }\` Plan

            | Step | Result |
            |------|--------|
            | Format | ${icon(fmt)} \`${fmt}\` |
            | Init   | ${icon(init)} \`${init}\` |
            | Validate | ${icon(validate)} \`${validate}\` |
            | Plan | ${icon(plan)} \`${plan}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${output.length > 60000 ? output.slice(0, 60000) + '\n... (truncated)' : output}
            \`\`\`
            </details>

            *Workflow: \`${{ github.workflow }}\` | Run: \`${{ github.run_id }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Fail the job if plan failed ───────────────────────────────────────────
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

###############################################################################
# STAGING DEPLOY — runs on push to main (no approval gate)
###############################################################################
  deploy-staging:
    name: "Deploy → Staging"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: staging

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TF-Apply-Staging

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false

      - name: Select Staging Workspace
        run: |
          terraform workspace select staging \
            || terraform workspace new staging

      - name: Terraform Apply — Staging
        run: |
          terraform apply \
            -var-file="envs/staging.tfvars" \
            -auto-approve \
            -input=false

###############################################################################
# PRODUCTION DEPLOY — requires manual approval via GitHub Environment gate
###############################################################################
  deploy-production:
    name: "Deploy → Production"
    needs: deploy-staging   # production only deploys after staging succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: production   # <── configure required reviewers here in GitHub UI

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TF-Apply-Production

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false

      - name: Select Production Workspace
        run: |
          terraform workspace select production \
            || terraform workspace new production

      - name: Terraform Plan — Production
        id: plan
        run: |
          terraform plan \
            -var-file="envs/production.tfvars" \
            -no-color \
            -out=production.tfplan \
            -input=false

      - name: Terraform Apply — Production
        run: |
          terraform apply \
            -input=false \
            production.tfplan
