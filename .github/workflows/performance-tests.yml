name: Performance Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start API server
        working-directory: backend
        run: |
          npm start &
          echo $! > server.pid
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -f http://localhost:3001/api/health/1 2>/dev/null; do sleep 1; done'
        env:
          PORT: 3001
          NODE_ENV: test
          CONTRACT_ID: test_contract_id
          RPC_URL: https://soroban-testnet.stellar.org

      - name: Run performance tests
        working-directory: backend
        run: npm run perf:test
        env:
          API_URL: http://localhost:3001

      - name: Stop API server
        if: always()
        working-directory: backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.sha }}
          path: backend/performance-results/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const resultsDir = path.join(process.cwd(), 'backend/performance-results');
            if (!fs.existsSync(resultsDir)) {
              console.log('No results directory found');
              return;
            }
            
            const files = fs.readdirSync(resultsDir);
            if (files.length === 0) {
              console.log('No result files found');
              return;
            }
            
            const latestFile = files.sort().reverse()[0];
            const results = JSON.parse(fs.readFileSync(path.join(resultsDir, latestFile), 'utf8'));
            
            let comment = '## 🚀 Performance Test Results\n\n';
            comment += '| Endpoint | p95 Latency | Baseline | Threshold | Status |\n';
            comment += '|----------|-------------|----------|-----------|--------|\n';
            
            results.forEach(result => {
              if (result.error) {
                comment += `| ${result.name} | - | - | - | ❌ ERROR |\n`;
              } else {
                const status = result.passed ? '✅ PASS' : '❌ FAIL';
                comment += `| ${result.name} | ${result.latency.p95.toFixed(2)}ms | ${result.baseline}ms | ${result.threshold}ms | ${status} |\n`;
              }
            });
            
            comment += '\n**Test Configuration:**\n';
            comment += '- Concurrent Users: 50\n';
            comment += '- Duration: 30 seconds\n';
            comment += '- Failure Threshold: 2x baseline p95\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
