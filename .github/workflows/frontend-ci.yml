name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Contrast audit
        run: npm run test:contrast

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:coverage -- --coverageReporters=json-summary --coverageReporters=text

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: ${{ secrets.NEXT_PUBLIC_NETWORK }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CONTRACT_ID: ${{ secrets.CONTRACT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/.next/cache
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: ${{ secrets.NEXT_PUBLIC_NETWORK }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CONTRACT_ID: ${{ secrets.CONTRACT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun --config=lighthouserc.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Report Lighthouse scores
        if: always()
        run: |
          report=$(find .lighthouseci -name '*.json' | head -1)
          if [ -n "$report" ]; then
            perf=$(node -e "const r=require('$report'); console.log(Math.round(r.categories.performance.score*100))" 2>/dev/null || echo "N/A")
            a11y=$(node -e "const r=require('$report'); console.log(Math.round(r.categories.accessibility.score*100))" 2>/dev/null || echo "N/A")
            bp=$(node -e "const r=require('$report'); console.log(Math.round(r.categories['best-practices'].score*100))" 2>/dev/null || echo "N/A")
            seo=$(node -e "const r=require('$report'); console.log(Math.round(r.categories.seo.score*100))" 2>/dev/null || echo "N/A")
            echo "## Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Score | Threshold |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Performance | $perf | ≥ 80 |" >> $GITHUB_STEP_SUMMARY
            echo "| Accessibility | $a11y | ≥ 90 |" >> $GITHUB_STEP_SUMMARY
            echo "| Best Practices | $bp | ≥ 90 |" >> $GITHUB_STEP_SUMMARY
            echo "| SEO | $seo | ≥ 80 |" >> $GITHUB_STEP_SUMMARY
          fi
