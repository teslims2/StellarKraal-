# Add this to your OpenAPI spec under /api/v1/collateral
parameters:
  - name: limit
    in: query
    description: Number of records to return (default: 20, max: 100)
    schema:
      type: integer
      minimum: 1
      maximum: 100
      default: 20
    required: false
  - name: cursor
    in: query
    description: Pagination cursor for next page
    schema:
      type: string
    required: false

# Response schema
responses:
  200:
    description: Successful response with pagination
    content:
      application/json:
        schema:
          type: object
          properties:
            collateral:
              type: array
              items:
                $ref: '#/components/schemas/Collateral'
            nextCursor:
              type: string
              nullable: true
              description: Cursor for next page (null if last page)
            limit:
              type: integer
              description: Number of records returned
